name: Build APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
      appName:
        description: 'App Name'
        required: true
      packageName:
        description: 'Package Name (com.example.app)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    # Setup Java 11
    - name: Setup JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    # Cache Gradle
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    # Setup Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    # Install Node.js (untuk Bubblewrap)
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
    
    # Install Bubblewrap CLI
    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli
    
    # Generate Manifest.json sementara
    - name: Create Manifest
      run: |
        mkdir -p ./build
        cat > ./build/manifest.json << 'EOF'
        {
          "short_name": "${{ github.event.inputs.appName }}",
          "name": "${{ github.event.inputs.appName }}",
          "start_url": "${{ github.event.inputs.url }}",
          "display": "standalone",
          "theme_color": "#000000",
          "background_color": "#ffffff"
        }
        EOF
    
    # Initialize Bubblewrap project
    - name: Init Bubblewrap
      run: |
        cd ./build
        bubblewrap init --manifest "./manifest.json" \
          --name "${{ github.event.inputs.appName }}" \
          --package "${{ github.event.inputs.packageName }}" \
          --skip-signing \
          --yes
    
    # Build APK
    - name: Build APK
      run: |
        cd ./build
        bubblewrap build
        ls -la ./app/build/outputs/apk/release/
    
    # Rename APK
    - name: Rename APK
      run: |
        cd ./build/app/build/outputs/apk/release
        mv app-release-unsigned.apk ${{ github.event.inputs.appName }}-unsigned.apk
    
    # Upload to GitHub Releases
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "build-${{ github.run_number }}-${{ github.run_id }}"
        name: "${{ github.event.inputs.appName }} - Build #${{ github.run_number }}"
        body: |
          ## APK Generated Successfully
          
          - **Website URL:** ${{ github.event.inputs.url }}
          - **App Name:** ${{ github.event.inputs.appName }}
          - **Package:** ${{ github.event.inputs.packageName }}
          - **Build Date:** ${{ github.event.head_commit.timestamp }}
          
          ### Cara Install
          1. Download APK di bawah
          2. Aktifkan "Install from unknown sources" di pengaturan Android
          3. Install APK
          
          **Catatan:** APK ini unsigned (debug build). Untuk Play Store, perlu signing keystore.
        files: ./build/app/build/outputs/apk/release/${{ github.event.inputs.appName }}-unsigned.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # Simpan info build untuk API
    - name: Save Build Info
      run: |
        mkdir -p ./output
        cat > ./output/latest.json << EOF
        {
          "buildId": "${{ github.run_id }}",
          "buildNumber": "${{ github.run_number }}",
          "appName": "${{ github.event.inputs.appName }}",
          "url": "${{ github.event.inputs.url }}",
          "downloadUrl": "https://github.com/${{ github.repository }}/releases/tag/build-${{ github.run_number }}-${{ github.run_id }}",
          "status": "completed",
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOF
    
    # Upload build info sebagai artifact
    - name: Upload Build Info
      uses: actions/upload-artifact@v3
      with:
        name: build-info
        path: ./output/latest.json
